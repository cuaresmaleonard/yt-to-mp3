services:
  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - media_data:/tmp/yt-to-mp3
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    env_file:
      - .env
    volumes:
      - media_data:/tmp/yt-to-mp3
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yttomp3
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d yttomp3"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  media_data:
